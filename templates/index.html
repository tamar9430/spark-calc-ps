<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark ProStation vs On-Prem Workstation Calculator</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Google Fonts: Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Basic form styling */
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: white;
        }

        .logo-container {
            text-align: center;
            margin-top: 20px;
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
        }

        h1 {
            text-align: center;
            margin-top: 10px;
            color: #ffffff;
            font-size: 20px;
        }

        form {
            background-color: #333333;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            border: 2px solid #af69f5;
        }

        form label {
            display: block;
            margin-bottom: 10px;
            color: #ffffff;
            font-size: 14px;
        }

        form input[type="range"] {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        form select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #444444;
            color: white;
        }

        .results {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #333333;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            text-align: center;
            border: 2px solid #af69f5;
        }

        .results p {
            font-size: 1.1em;
            color: #ffffff;
            font-size: 18px;
        }

        /* Spark Cost styling */
        .results p.spark-cost {
            color: #edff79; /* Green for Spark Cost */
            font-weight: bold;
        }

        .discount-label {
            color: #edff79; /* Green for the discount label */
        }


        .accent {
            accent-color: #af69f5;
        }
        


        @media (max-width: 600px) {
            form label,
            form input,
            form select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="{{ url_for('static', filename='spark-logo.png') }}" alt="Spark Cloud Studio Logo">
    </div>

    <h1>Spark ProStation vs On-Prem Workstation Cost Calculator</h1>

    <form id="calculator-form">
        <!-- Number of Users -->
        <div class="form-group">
            <label for="num_devs">Number of Users</label>
            <span id="num_devs_value">30</span>
            <input type="range" id="num_devs" name="num_devs" class="accent" min="1" max="100" value="30">
        </div>

        <!-- On-Prem Machine Cost/user -->
        <div class="form-group">
            <label for="on_prem_cost_per_dev">On-Prem Machine Cost/user</label>
            <span id="on_prem_cost_per_dev_value">$6500</span>
            <input type="range" id="on_prem_cost_per_dev" name="on_prem_cost_per_dev" class="accent" min="2000" max="12000" step="100" value="6500">
        </div>

        <!-- On-Prem Annual Infrastructure Costs -->
        <div class="form-group">
            <label for="annual_maint_costs">On-Prem Annual Infrastructure Costs/year</label>
            <span id="annual_maint_costs_value">$7500</span>
            <input type="range" id="annual_maint_costs" name="annual_maint_costs" class="accent" min="0" max="30000" step="100" value="7500">
        </div>

        <!-- Combined Slider for Usage Hours/year -->
        <div class="form-group">
            <label for="usage_hours_per_year">
                Usage Hours/year <span id="discount-label-hours" class="discount-label"></span>
            </label>
            <span id="usage_hours_per_year_value">2000</span>
            <input type="range" id="usage_hours_per_year" name="usage_hours_per_year" class="accent" min="500" max="5000" step="10" value="2000">
        </div>

        <!-- New Dropdown for OS Type -->
        <div class="form-group">
            <label for="os_type">
                Operating System <span id="discount-label-os" class="discount-label"></span>
            </label>
            <select id="os_type" name="os_type">
                <option value="windows">Windows</option>
                <option value="linux">Rocky Linux</option>
            </select>
        </div>

        <div class="form-group">
            <label for="spark_prostation">Spark ProStation</label>
            <select id="spark_prostation" name="spark_prostation">
                {% for machine, cost in machine_options.items() %}
                    <option value="{{ machine }}" {% if machine == default_machine %}selected{% endif %}>
                        {{ machine }} | ${{ cost }}/hr
                    </option>
                {% endfor %}
            </select>
        </div>
    </form>

    <div class="results">
        <p class="spark-cost"><strong>Spark ProStation:</strong> $<span id="cloud_cost">0.00</span></p>
        <p><strong>On-Prem Workstation:</strong> $<span id="on_prem_cost">0.00</span></p>
    </div>

    <script>
        const formatCurrency = (amount) => Number(amount).toLocaleString(undefined, { minimumFractionDigits: 2 });

        const calculateAndUpdate = () => {
            // Serialize form data
            const formData = $('#calculator-form').serialize();

            // Send data to the server
            $.ajax({
                type: 'POST',
                url: '/calculate',
                data: formData,
                success: (response) => {
                    let cloudCost = response.cloud_cost;
                    $('#cloud_cost').text(formatCurrency(cloudCost));
                    $('#on_prem_cost').text(formatCurrency(response.on_prem_cost));
                }
            });
        };

        const updateDiscountLabels = () => {
            const usageHours = parseInt($('#usage_hours_per_year').val());
            const osType = $('#os_type').val();

            // Handle [30% discount] for Usage Hours/year
            if (usageHours > 1000) {
                $('#discount-label-hours').text('[30% discount]').show();
            } else {
                $('#discount-label-hours').text('').hide();
            }

            // Handle [25% discount] for Rocky Linux
            if (osType === 'linux') {
                $('#discount-label-os').text('[25% discount]').show();
            } else {
                $('#discount-label-os').text('').hide();
            }
        };

        const updateSliderValue = (sliderId, displayId) => {
            $(`#${sliderId}`).on('input', function () {
                const value = $(this).val();

                if (sliderId === 'on_prem_cost_per_dev' || sliderId === 'annual_maint_costs') {
                    $(`#${displayId}`).text(`$${value}`);
                } else {
                    $(`#${displayId}`).text(value);
                }

                // Update discount labels on slider change
                updateDiscountLabels();
            });
        };

        $(document).ready(() => {
            // Initialize default calculation
            calculateAndUpdate();

            // Ensure discount labels are shown on page load
            updateDiscountLabels();

            // Update slider values dynamically
            updateSliderValue('num_devs', 'num_devs_value');
            updateSliderValue('on_prem_cost_per_dev', 'on_prem_cost_per_dev_value');
            updateSliderValue('annual_maint_costs', 'annual_maint_costs_value');
            updateSliderValue('usage_hours_per_year', 'usage_hours_per_year_value'); // New slider

            // Update discount labels and calculations on dropdown changes
            $('#os_type, #spark_prostation').on('change', () => {
                updateDiscountLabels();
                calculateAndUpdate();
            });

            // Trigger recalculations on slider changes
            $('input[type="range"]').on('input', calculateAndUpdate);
        });
    </script>
</body>
</html>
